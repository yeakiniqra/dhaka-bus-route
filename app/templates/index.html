<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dhaka Transit | Neo-Brutalist Routing</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', path='bus.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Inter:wght@400;500;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --gray-light: #f4f4f5;
      --gray-mid: #d4d4d8;
      --gray-dark: #52525b;
      
      /* Brutalist Accents */
      --c-yellow: #fde047;
      --c-cyan:   #67e8f9;
      --c-pink:   #f9a8d4;
      --c-green:  #86efac;
      --c-purple: #d8b4fe;
      
      --font-display: 'Clash Display', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Minimalist Grid Pattern Background */
    body::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-size: 30px 30px;
      background-image: linear-gradient(to right, var(--gray-light) 1px, transparent 1px),
                        linear-gradient(to bottom, var(--gray-light) 1px, transparent 1px);
      z-index: -1;
    }

    /* Nav */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 5%; border-bottom: 3px solid var(--fg); background: var(--bg);
      position: sticky; top: 0; z-index: 1000;
    }
    
    .nav-brand {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--fg);
      text-decoration: none; text-transform: uppercase; letter-spacing: -0.5px;
      transition: transform 0.2s;
    }
    .nav-brand:hover { transform: scale(1.02); }

    .nav-links { display: flex; gap: 2rem; align-items: center;}
    @media (max-width: 600px) {
      .nav-links { gap: 0.5rem; }
      .nav-links span { display: none; }
      #nav-routes { display: none !important; }
      .nav-links a {
        padding: 0;
        width: 44px; height: 44px;
        justify-content: center;
        border: 2px solid var(--fg);
        background: var(--bg);
        box-shadow: 3px 3px 0 var(--fg);
      }
      .nav { padding: 1rem 5%; }
    }
    
    .nav-links a {
      background: none; border: none; color: var(--fg); font-family: var(--font-mono);
      font-size: 0.9rem; font-weight: 700; text-transform: uppercase; text-decoration: none;
      cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s;
      padding: 0.4rem 0.8rem; border: 2px solid transparent; border-radius: 0;
    }
    .nav-links a:hover, .nav-links a.active {
      border: 2px solid var(--fg); background: var(--c-yellow); box-shadow: 3px 3px 0 var(--fg);
    }

    /* Container */
    .container { max-width: 1000px; margin: 0 auto; padding: 4rem 1.5rem; flex: 1; width: 100%; }
    @media (max-width: 600px) { .container { padding: 2rem 1rem; } }

    /* Brutalist Card */
    .card {
      background: var(--bg); border: 3px solid var(--fg); padding: 3rem;
      box-shadow: 12px 12px 0 var(--fg); margin-bottom: 3rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    @media (max-width: 600px) { .card { padding: 1.5rem; box-shadow: 8px 8px 0 var(--fg); } }
    .card:hover { transform: translate(-2px, -2px); box-shadow: 14px 14px 0 var(--fg); }

    .view-section { display: none; }
    .view-section.active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typography */
    h1, h2, h3 { font-family: var(--font-display); font-weight: 800; letter-spacing: -1px; }
    .hero-img {
      max-width: 100%; height: auto; max-height: 150px;
      border: 4px solid var(--fg);
      box-shadow: 10px 10px 0 var(--c-cyan);
      margin-bottom: 2rem;
      display: inline-block;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      background: var(--bg);
      border-radius: 0;
    }
    .hero-img:hover {
      box-shadow: 14px 14px 0 var(--c-pink);
      transform: translate(-2px, -2px);
      background: var(--c-yellow);
    }
    @media (max-width: 600px) {
      .hero-img { max-height: 100px; box-shadow: 6px 6px 0 var(--c-cyan); }
    }

    .hero-sub {
      font-family: var(--font-mono); font-size: 1rem; color: var(--gray-dark);
      max-width: 600px; margin-bottom: 3rem; line-height: 1.6;
    }

    /* Form Elements */
    .search-row { display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 2rem; }
    @media (max-width: 768px) { .search-row { flex-direction: column; align-items: stretch; } }

    .input-wrapper { flex: 1; position: relative; }
    .input-wrapper:focus-within { z-index: 20; }
    .input-label {
      display: block; font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
    }

    .mono-input {
      width: 100%; background: var(--bg); border: 3px solid var(--fg); padding: 1.25rem 1rem 1.25rem 3rem;
      font-family: var(--font-body); font-size: 1.1rem; font-weight: 700; color: var(--fg); outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .mono-input:focus { background: var(--c-yellow); box-shadow: 6px 6px 0 var(--fg); transform: translate(-2px, -2px); }
    
    .input-icon { position: absolute; left: 1rem; top: 3.2rem; font-size: 1.2rem; font-weight:bold; }

    .swap-btn {
      width: 58px; height: 58px; background: var(--c-purple); border: 3px solid var(--fg);
      display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem;
      transition: all 0.2s; box-shadow: 4px 4px 0 var(--fg);
    }
    @media (max-width: 768px) { .swap-btn { width: 100%; height: 48px; box-shadow: 0px 4px 0 var(--fg); margin: 0.5rem 0; } }
    .swap-btn:hover { background: var(--c-pink); }
    .swap-btn:active { box-shadow: 0 0 0 var(--fg); transform: translate(2px, 2px); }

    .btn-solid {
      position: relative; z-index: 1;
      width: 100%; padding: 1.35rem; background: var(--c-green); color: var(--fg); border: 3px solid var(--fg);
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      transition: all 0.1s; box-shadow: 8px 8px 0 var(--fg);
    }
    .btn-solid:hover { background: var(--c-cyan); transform: translate(-2px, -2px); box-shadow: 10px 10px 0 var(--fg); }
    .btn-solid:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--fg); }

    /* Autocomplete */
    .suggestions {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--bg); border: 3px solid var(--fg); max-height: 250px; overflow-y: auto;
      z-index: 50; display: none; box-shadow: 6px 6px 0 var(--fg);
    }
    .suggestions.open { display: block; animation: slideUp 0.2s ease forwards; }
    .s-item {
      padding: 1rem; cursor: pointer; border-bottom: 2px solid var(--gray-mid);
      display: flex; align-items: center; gap: 0.75rem; font-weight: 600; transition: background 0.1s;
    }
    .s-item:last-child { border-bottom: none; }
    .s-item:hover { background: var(--c-pink); color: var(--fg); padding-left: 1.5rem; }

    /* Results Interface */
    .route-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; justify-content: center;}
    .pill {
      border: 3px solid var(--fg); padding: 0.75rem 1.5rem; font-family: var(--font-display);
      font-weight: 800; font-size: 1.1rem; background: var(--c-yellow); box-shadow: 4px 4px 0 var(--fg);
    }
    
    .status-msg {
      padding: 1.5rem; border: 3px solid var(--fg); font-family: var(--font-mono);
      margin-bottom: 2.5rem; font-weight: 700; display: flex; align-items: center; gap: 1rem;
      background: var(--bg); box-shadow: 6px 6px 0 var(--fg); animation: dropIn 0.4s ease;
    }
    @keyframes dropIn { from { transform: scale(0.95); opacity:0;} to { transform: scale(1); opacity:1;} }
    
    .s-success { background: var(--c-green); }
    .s-warn { background: var(--c-yellow); }
    .s-fail { background: var(--c-pink); }

    /* Routes Output Details */
    .route-item {
      border: 3px solid var(--fg); margin-bottom: 2rem; background: var(--bg);
      box-shadow: 8px 8px 0 var(--fg); transition: all 0.2s; overflow: hidden;
      animation: fadeUp 0.5s ease backwards;
    }
    @keyframes fadeUp { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}
    
    .route-item:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0 var(--fg); }
    
    .route-item-header {
      padding: 1.5rem; border-bottom: 3px solid var(--fg);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
      background: var(--c-cyan);
    }
    .route-name { font-size: 1.5rem; font-weight: 800; font-family: var(--font-display); display: flex; align-items: center; gap: 0.75rem; text-transform: uppercase;}
    .route-meta { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; background: var(--bg); padding: 0.5rem 1rem; border: 2px solid var(--fg); box-shadow: 3px 3px 0 var(--fg); }

    .route-body { padding: 1.5rem; background: var(--bg); }
    
    /* Inline Sequence Stop Flow */
    .stop-flow {
      line-height: 1.8; font-family: var(--font-body); font-weight: 600; font-size: 1.05rem;
      color: var(--fg); display: inline-block; word-break: break-word;
    }
    .flow-stop-first { background: var(--c-green); border: 2px solid var(--fg); padding: 2px 8px; border-radius: 4px; }
    .flow-stop-last { background: var(--c-pink); border: 2px solid var(--fg); padding: 2px 8px; border-radius: 4px; }

    .leg-title {
      display: inline-block; padding: 0.4rem 1rem; border: 3px solid var(--fg); background: var(--c-purple);
      font-family: var(--font-display); font-weight: 800; margin: 1.5rem 0 0.75rem 0; box-shadow: 4px 4px 0 var(--fg); font-size: 1.1rem;
    }

    .transfer-box {
      border: 3px solid var(--fg); padding: 1.25rem; text-align: center; background: var(--c-yellow);
      margin: 2rem 0; font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; box-shadow: inset 4px 4px 0 rgba(0,0,0,0.1);
    }

    /* Network Grid */
    .net-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .net-card {
      border: 3px solid var(--fg); padding: 1.5rem; cursor: pointer; transition: all 0.2s; background: var(--bg); box-shadow: 6px 6px 0 var(--fg);
    }
    .net-card:hover { background: var(--c-yellow); transform: translate(-4px, -4px); box-shadow: 10px 10px 0 var(--fg); }
    .n-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; font-family: var(--font-display); text-transform: uppercase;}
    .n-stops { font-family: var(--font-mono); font-size: 0.9rem; font-weight:700;}

    .loader {
      width: 56px; height: 56px; border: 6px solid var(--fg); border-bottom-color: var(--c-pink);
      border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; margin: 2rem auto; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="javascript:void(0)" onclick="switchView('search')" class="nav-brand">
      <i class="hgi-stroke hgi-bus-01"></i> Dhaka Bus Route
    </a>
    <div class="nav-links">
      <a href="javascript:void(0)" onclick="switchView('search')" id="nav-search" class="active"><i class="hgi-stroke hgi-search-01"></i> <span>Search</span></a>
      <a href="javascript:void(0)" onclick="switchView('routes')" id="nav-routes"><i class="hgi-stroke hgi-map-02"></i> <span>All Routes</span></a>
      <a href="/docs" target="_blank"><i class="hgi-stroke hgi-file-01"></i> <span>API Docs</span></a>
    </div>
  </nav>

  <main class="container">
    <div id="loader" style="text-align:center;"><span class="loader"></span></div>

    <!-- SEARCH VIEW -->
    <div id="view-search" class="view-section active">

      <div class="card">
        <form id="search-form" onsubmit="handleSearch(event)">
          <div class="search-row">
            
            <div class="input-wrapper">
              <label class="input-label"><i class="hgi-stroke hgi-location-01"></i> Departure</label>
              <i class="hgi-stroke hgi-flag-02 input-icon"></i>
              <input type="text" id="from-stop" class="mono-input" placeholder="Where from? e.g. Mirpur 1" autocomplete="off" required>
              <div class="suggestions" id="from-suggestions"></div>
            </div>

            <button type="button" class="swap-btn" onclick="swapStops()"><i class="hgi-stroke hgi-arrow-left-right"></i></button>

            <div class="input-wrapper">
              <label class="input-label"><i class="hgi-stroke hgi-location-add-01"></i> Destination</label>
              <i class="hgi-stroke hgi-pin-02 input-icon"></i>
              <input type="text" id="to-stop" class="mono-input" placeholder="Where to? e.g. Gulshan 1" autocomplete="off" required>
              <div class="suggestions" id="to-suggestions"></div>
            </div>

          </div>
          
          <button type="submit" class="btn-solid">
            Find Route <i class="hgi-stroke hgi-arrow-right-01"></i>
          </button>
        </form>
      </div>


    </div>

    <!-- RESULTS VIEW -->
    <div id="view-results" class="view-section"></div>

    <!-- ALL ROUTES VIEW -->
    <div id="view-routes" class="view-section">
      <h2 style="font-size: 2.5rem; margin-bottom: 2rem; text-transform:uppercase;">Network Directory</h2>
      <div style="margin-bottom: 3rem;">
        <input type="text" id="route-filter" class="mono-input" placeholder="Filter by name..." style="padding-left:1.5rem; max-width:400px; box-shadow:4px 4px 0 var(--fg);">
      </div>
      <div class="net-grid" id="routes-container"></div>
    </div>
  </main>

  <script>
    const allStops = {{ all_stops | tojson | safe }};
    const engineUrlPrefix = '/api';
    const state = { allRoutes: [] };

    window.addEventListener('popstate', handleRouter);
    document.addEventListener("DOMContentLoaded", () => {
      setupAutocomplete('from-stop', 'from-suggestions');
      setupAutocomplete('to-stop', 'to-suggestions');
      
      document.getElementById('route-filter').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.net-card').forEach(card => {
          card.style.display = card.dataset.search.toLowerCase().includes(q) ? 'block' : 'none';
        });
      });
      handleRouter();
    });

    function handleRouter() {
      const path = window.location.pathname;
      if (path === '/routes') switchView('routes', false);
      else switchView('search', false);
    }

    function switchView(viewName, pushState = true) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(`view-${viewName}`).classList.add('active');
      
      document.querySelector('#nav-search').classList.toggle('active', viewName === 'search' || viewName === 'results');
      document.querySelector('#nav-routes').classList.toggle('active', viewName === 'routes');
      
      if (pushState) {
        if (viewName === 'routes') window.history.pushState({}, '', '/routes');
        else window.history.pushState({}, '', '/');
      }

      if (viewName === 'routes' && state.allRoutes.length === 0) loadAllRoutes();
    }

    function swapStops() {
      const f = document.getElementById('from-stop');
      const t = document.getElementById('to-stop');
      [f.value, t.value] = [t.value, f.value];
    }

    function setupAutocomplete(inputId, listId) {
      const input = document.getElementById(inputId);
      const list = document.getElementById(listId);
      const render = () => {
        const q = input.value.trim().toLowerCase();
        let filtered = allStops;
        if (q.length > 0) {
            filtered = allStops.filter(s => s.toLowerCase().includes(q));
        }
        filtered = filtered.slice(0, 50);
        if(!filtered.length) { list.classList.remove('open'); return; }

        list.innerHTML = filtered.map(item => `
          <div class="s-item" onmousedown="event.preventDefault(); selectStop('${inputId}', '${listId}', '${item.replace(/'/g, "\\'")}')">
            <i class="hgi-stroke hgi-location-01"></i> ${item}
          </div>
        `).join('');
        list.classList.add('open');
      };
      input.addEventListener('focus', render);
      input.addEventListener('input', render);
      input.addEventListener('blur', () => list.classList.remove('open'));
    }

    window.selectStop = function(inputId, listId, val) {
      document.getElementById(inputId).value = val;
      document.getElementById(listId).classList.remove('open');
    }

    async function loadAllRoutes() {
      document.getElementById('loader').style.display = 'block';
      try {
        const res = await fetch(`${engineUrlPrefix}/routes`);
        const data = await res.json();
        state.allRoutes = data.routes;
        document.getElementById('routes-container').innerHTML = state.allRoutes.map(item => `
          <div class="net-card" data-search="${item.name} ${item.stops.join(' ')}">
             <div class="n-name">${item.name}</div>
             <div class="n-stops"><i class="hgi-stroke hgi-signpost"></i> ${item.stops.length} STOPS</div>
          </div>
        `).join('');
      } catch (e) {} finally {
        document.getElementById('loader').style.display = 'none';
      }
    }

    async function handleSearch(e) {
      e.preventDefault();
      const from = document.getElementById('from-stop').value;
      const to = document.getElementById('to-stop').value;
      if(!from || !to) return;

      switchView('results', false);
      window.scrollTo(0,0);
      const container = document.getElementById('view-results');
      container.innerHTML = `<div style="text-align:center; padding: 4rem 0;"><span class="loader" style="display:inline-block"></span></div>`;

      try {
        const res = await fetch(`${engineUrlPrefix}/search?from_stop=${encodeURIComponent(from)}&to_stop=${encodeURIComponent(to)}`);
        const data = await res.json();
        renderResults(data);
      } catch(err) {
        container.innerHTML = `<div class="status-msg s-fail"><i class="hgi-stroke hgi-alert-02" style="font-size:1.5rem;"></i> System Error: Check Connection</div>`;
      }
    }

    function getFlowString(fromStop, intermediateStops, toStop) {
        let all = [fromStop];
        if (intermediateStops && intermediateStops.length) {
            all = all.concat(intermediateStops);
        }
        all.push(toStop);

        return all.map((stop, i) => {
            if(i === 0) return `<span class="flow-stop-first">${stop}</span>`;
            if(i === all.length-1) return `<span class="flow-stop-last">${stop}</span>`;
            return stop;
        }).join(' ⇄ ');
    }

    function renderResults(res) {
      let html = `
        <div class="route-header">
           <div class="pill">${res.from_stop_matched}</div>
           <i class="hgi-stroke hgi-arrow-right-01" style="font-size:2rem; font-weight:bold;"></i>
           <div class="pill" style="background:var(--c-pink);">${res.to_stop_matched}</div>
        </div>
      `;

      if (res.has_results) {
         if(res.direct_routes && res.direct_routes.length) {
            html += `<div class="status-msg s-success"><i class="hgi-stroke hgi-checkmark-circle-02" style="font-size:1.5rem;"></i> ${res.message}</div>`;
            html += `<h3 style="margin-bottom:1.5rem; text-transform:uppercase;">Direct Connections</h3>`;
            html += res.direct_routes.map((r, idx) => `
               <div class="route-item" style="animation-delay: ${idx * 0.1}s;">
                  <div class="route-item-header" style="background:var(--c-cyan);">
                     <div class="route-name"><i class="hgi-stroke hgi-bus-02"></i> ${r.bus_name}</div>
                     <div class="route-meta"><i class="hgi-stroke hgi-signpost"></i> ${r.stop_count} STOPS</div>
                  </div>
                  <div class="route-body">
                     <div class="stop-flow">
                        ${getFlowString(r.from_stop, r.intermediate_stops, r.to_stop)}
                     </div>
                  </div>
               </div>
            `).join('');
         }

         if(res.indirect_routes && res.indirect_routes.length) {
            if(!res.direct_routes || !res.direct_routes.length) html += `<div class="status-msg s-warn"><i class="hgi-stroke hgi-routing-02" style="font-size:1.5rem;"></i> ${res.message}</div>`;
            html += `<h3 style="margin-bottom:1.5rem; margin-top:2rem; text-transform:uppercase;">Interchange Routes</h3>`;
            html += res.indirect_routes.map((r, idx) => `
               <div class="route-item" style="border-style:dashed; animation-delay: ${idx * 0.1}s;">
                  <div class="route-item-header" style="background:var(--c-yellow);">
                     <div class="route-name" style="font-size:1.4rem;"><i class="hgi-stroke hgi-routing-02"></i> TRANSFER VIA ${r.transfer_point}</div>
                     <div class="route-meta"><i class="hgi-stroke hgi-signpost"></i> ${r.total_stops} TOTAL STOPS</div>
                  </div>
                  <div class="route-body">
                     <div class="leg-title" style="background:var(--c-cyan)"><i class="hgi-stroke hgi-bus-02"></i> LEG 1: ${r.first_leg.bus_name}</div>
                     <div class="stop-flow">
                        ${getFlowString(r.first_leg.from_stop, r.first_leg.intermediate_stops, r.first_leg.to_stop)}
                     </div>

                     <div class="transfer-box">
                        <i class="hgi-stroke hgi-walking"></i> SWITCH BUSES AT <span style="background:var(--bg); border:2px solid var(--fg); padding:2px 6px; margin-left:4px;">${r.transfer_point}</span>
                     </div>

                     <div class="leg-title" style="background:var(--c-pink)"><i class="hgi-stroke hgi-bus-02"></i> LEG 2: ${r.second_leg.bus_name}</div>
                     <div class="stop-flow">
                        ${getFlowString(r.second_leg.from_stop, r.second_leg.intermediate_stops, r.second_leg.to_stop)}
                     </div>
                  </div>
               </div>
            `).join('');
         }
      } else {
         html += `<div class="status-msg s-fail"><i class="hgi-stroke hgi-alert-02" style="font-size:1.5rem;"></i> ${res.message}</div>`;
      }
      
      html += `<div style="margin-top:2rem;"><button class="btn-solid" style="background:var(--c-purple);" onclick="switchView('search', false)"><i class="hgi-stroke hgi-search-01"></i> SEARCH AGAIN</button></div>`;
      document.getElementById('view-results').innerHTML = html;
    }
  </script>
</body>
</html>
